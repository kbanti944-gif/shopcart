<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Products - Purniya Construction Materials</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100">
  <div class="min-h-screen p-6 md:p-10">
    <div class="max-w-6xl mx-auto">
      <!-- Header -->
      <div class="flex justify-between items-center mb-8">
        <div>
          <h1 class="text-3xl font-bold text-gray-900">🛍️ Browse Products</h1>
          <p id="shop-info-display" class="text-gray-600 mt-2"></p>
        </div>
        <a href="index.html" class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded-lg">
          ← Home
        </a>
      </div>

      <!-- Main Content -->
      <div class="grid md:grid-cols-3 gap-8">
        <!-- Products List -->
        <div class="md:col-span-2">
          <div id="products-container" class="space-y-4">
            <p class="text-gray-500 text-center py-8">Loading shop products...</p>
          </div>
        </div>

        <!-- Cart Sidebar -->
        <div class="md:col-span-1 h-fit sticky top-6">
          <div class="bg-white rounded-xl shadow-lg p-6 border-l-4 border-blue-400">
            <h2 class="text-xl font-bold text-gray-800 mb-4">🛒 Your Cart</h2>
            
            <div id="cart-items" class="space-y-3 mb-4 max-h-96 overflow-y-auto">
              <p class="text-gray-500 text-center py-4">Cart is empty</p>
            </div>

            <!-- Cart Summary -->
            <div class="bg-gray-50 rounded-lg p-4 mb-4 border border-gray-200">
              <div class="flex justify-between mb-2">
                <span class="text-gray-700">Items:</span>
                <span id="cart-count" class="font-bold">0</span>
              </div>
              <div class="flex justify-between mb-2">
                <span class="text-gray-700">Total Quantity:</span>
                <span id="total-qty" class="font-bold">0</span>
              </div>
              <div class="flex justify-between text-lg font-bold">
                <span>Total:</span>
                <span id="total-price">₹0</span>
              </div>
            </div>

            <!-- Actions -->
            <button 
              id="clear-cart-btn"
              onclick="clearCart()" 
              class="w-full bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-4 rounded-lg mb-2 transition"
            >
              Clear Cart
            </button>

            <button 
              id="share-cart-btn"
              onclick="shareCartViaWhatsApp()" 
              class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-lg flex items-center justify-center gap-2 transition disabled:opacity-50 disabled:cursor-not-allowed"
              disabled
            >
              💬 Share Cart via WhatsApp
            </button>

            <button 
              id="copy-cart-btn"
              onclick="copyCartText()" 
              class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded-lg mt-2 transition disabled:opacity-50 disabled:cursor-not-allowed"
              disabled
            >
              Copy Cart Text
            </button>
          </div>

          <!-- Info Box -->
          <div class="mt-6 bg-blue-50 border border-blue-200 rounded-lg p-4 text-sm text-blue-800">
            <h4 class="font-bold mb-2">📝 How to Order:</h4>
            <ol class="list-decimal list-inside space-y-1">
              <li>Select products & quantity</li>
              <li>Review your cart</li>
              <li>Click "Share via WhatsApp"</li>
              <li>Send to shopkeeper</li>
              <li>Wait for confirmation</li>
              <li>Collect items! 🚚</li>
            </ol>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let shopData = null;
    let cart = [];

    // Load shop data from URL parameter
    function loadShop() {
      const urlParams = new URLSearchParams(window.location.search);
      const shopId = urlParams.get('shopId');

      if (!shopId) {
        document.getElementById('products-container').innerHTML = `
          <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-6">
            <p class="text-yellow-800 font-semibold">⚠️ No shop selected</p>
            <p class="text-yellow-700 text-sm mt-2">You need a shopkeeper's link to browse products.</p>
            <a href="index.html" class="text-yellow-600 hover:text-yellow-700 font-semibold mt-3 inline-block">← Go back</a>
          </div>
        `;
        return;
      }

      // Load shop from localStorage
      shopData = JSON.parse(localStorage.getItem(shopId));

      if (!shopData) {
        document.getElementById('products-container').innerHTML = `
          <div class="bg-red-50 border border-red-200 rounded-lg p-6">
            <p class="text-red-800 font-semibold">❌ Shop not found</p>
            <p class="text-red-700 text-sm mt-2">This shop doesn't exist or has been deleted.</p>
            <a href="index.html" class="text-red-600 hover:text-red-700 font-semibold mt-3 inline-block">← Go back</a>
          </div>
        `;
        return;
      }

      // Display shop info
      document.getElementById('shop-info-display').textContent = 
        ${shopData.shopName} • ${shopData.phone} • ${shopData.address};

      // Display products
      displayProducts();
    }

    // Display all products
    function displayProducts() {
      const container = document.getElementById('products-container');

      if (!shopData.products || shopData.products.length === 0) {
        container.innerHTML = `
          <div class="bg-gray-50 border border-gray-200 rounded-lg p-6 text-center">
            <p class="text-gray-600">This shop hasn't added any products yet.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = shopData.products.map((product, idx) => `
        <div class="bg-white rounded-lg shadow p-4 border border-gray-200">
          <h3 class="font-bold text-gray-800 mb-2">${product.name}</h3>
          <p class="text-sm text-gray-600 mb-3">${product.description || 'No description'}</p>
          
          <div class="flex justify-between items-center mb-3">
            <div>
              <span class="font-bold text-lg text-orange-600">₹${product.price}</span>
              <span class="text-sm text-gray-600"> per ${product.unit}</span>
            </div>
            <span class="text-sm text-gray-600">Stock: ${product.quantity}</span>
          </div>

          <div class="flex gap-2">
            <input 
              type="number" 
              id="qty-${idx}" 
              placeholder="Qty"
              min="0"
              max="${product.quantity}"
              value="0"
              class="flex-1 px-3 py-2 border border-gray-300 rounded text-center"
            >
            <button 
              onclick="addToCart(${idx})" 
              class="flex-1 bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded transition"
            >
              Add
            </button>
          </div>
        </div>
      `).join('');
    }

    // Add to cart
    function addToCart(productIndex) {
      const qty = parseInt(document.getElementById(qty-${productIndex}).value);
      
      if (qty <= 0) {
        alert('Please enter a quantity');
        return;
      }

      const product = shopData.products[productIndex];
      
      // Check if already in cart
      const existingItem = cart.find(item => item.id === product.id);
      
      if (existingItem) {
        existingItem.quantity += qty;
      } else {
        cart.push({
          ...product,
          quantity: qty
        });
      }

      // Reset input
      document.getElementById(qty-${productIndex}).value = '0';
      
      // Update cart display
      updateCartDisplay();
    }

    // Update cart display
    function updateCartDisplay() {
      const cartItemsDiv = document.getElementById('cart-items');
      const shareBtn = document.getElementById('share-cart-btn');
      const clearBtn = document.getElementById('clear-cart-btn');
      const copyBtn = document.getElementById('copy-cart-btn');

      if (cart.length === 0) {
        cartItemsDiv.innerHTML = '<p class="text-gray-500 text-center py-4">Cart is empty</p>';
        shareBtn.disabled = true;
        copyBtn.disabled = true;
        document.getElementById('cart-count').textContent = '0';
        document.getElementById('total-qty').textContent = '0';
        document.getElementById('total-price').textContent = '₹0';
        return;
      }

      // Display cart items
      cartItemsDiv.innerHTML = cart.map((item, idx) => `
        <div class="bg-blue-50 rounded-lg p-3 border border-blue-200">
          <div class="flex justify-between items-start mb-2">
            <h4 class="font-semibold text-gray-800 text-sm">${item.name}</h4>
            <button onclick="removeFromCart(${idx})" class="text-red-500 hover:text-red-700 font-bold text-sm">
              ✕
            </button>
          </div>
          <div class="flex justify-between text-sm text-gray-700">
            <span>${item.quantity} × ₹${item.price}</span>
            <span class="font-bold">₹${(item.quantity * item.price).toFixed(2)}</span>
          </div>
        </div>
      `).join('');

      // Calculate totals
      const totalItems = cart.length;
      const totalQty = cart.reduce((sum, item) => sum + item.quantity, 0);
      const totalPrice = cart.reduce((sum, item) => sum + (item.quantity * item.price), 0);

      document.getElementById('cart-count').textContent = totalItems;
      document.getElementById('total-qty').textContent = totalQty;
      document.getElementById('total-price').textContent = ₹${totalPrice.toFixed(2)};

      // Enable buttons
      shareBtn.disabled = false;
      copyBtn.disabled = false;
    }

    // Remove from cart
    function removeFromCart(idx) {
      cart.splice(idx, 1);
      updateCartDisplay();
    }

    // Clear cart
    function clearCart() {
      if (confirm('Clear cart?')) {
        cart = [];
        updateCartDisplay();
      }
    }

    // Generate cart text
    function generateCartText() {
      const items = cart.map(item => 
        ${item.name}: ${item.quantity} ${item.unit} × ₹${item.price} = ₹${(item.quantity * item.price).toFixed(2)}
      ).join('\n');

      const total = cart.reduce((sum, item) => sum + (item.quantity * item.price), 0);

      return 📦 ORDER FROM ${shopData.shopName}\n\n${items}\n\n💰 TOTAL: ₹${total.toFixed(2)}\n\nPlease confirm availability and delivery time.;
    }

    // Copy cart text
    function copyCartText() {
      const text = generateCartText();
      navigator.clipboard.writeText(text).then(() => {
        alert('✅ Cart copied to clipboard!');
      });
    }

    // Share via WhatsApp
    function shareCartViaWhatsApp() {
      const message = generateCartText();
      const phoneNumber = shopData.phone;
      
      // Format phone number for WhatsApp (add +91 for India)
      const whatsappPhone = phoneNumber.startsWith('+') ? phoneNumber : '+91' + phoneNumber;
      
      const whatsappURL = https://wa.me/${whatsappPhone}?text=${encodeURIComponent(message)};
      window.open(whatsappURL, '_blank');
    }

    // Initialize on page load
    loadShop();
  </script>
</body>
</html>
